server:
  port: 8081

spring:
  application:
    name: ideaspark
  flyway:
    enabled: false
    clean-disabled: true
    validate-on-migrate: false
  datasource:
    url: ${DB_URL:jdbc:mysql://62.234.128.72:3306/ideaspark?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${DB_USERNAME:ideaspark}
    password: ${DB_PASSWORD:icG62wSHYaaPKGX6}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        '[format_sql]': true
        jdbc:
          '[time_zone]': Asia/Shanghai

  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    org.springdoc: DEBUG
    org.springframework.web: DEBUG

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

jwt:
  secret: ${JWT_SECRET}
  expire-seconds: 3600
  issuer: ideaspark

oss:
  enabled: true
  endpoint: https://oss-cn-beijing.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY_ID}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET}
  bucket: ideaspark
  base-dir: uploads

